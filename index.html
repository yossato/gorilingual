  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1b3e;
      color: #fff;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.2rem;
      font-weight: bold;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .subtitle {
      text-align: center;
      color: #a0b4d6;

    }

    .char-map {
      background: #162040;
      border-radius: 12px;
      padding: 18px 24px;
      max-width: 700px;
      margin: 0 auto 28px;
      border: 1px solid #2a3f70;
    }

    .char-map h2 {
      text-align: center;
      font-size: 0.9rem;
      color: #a0b4d6;
      margin-bottom: 14px;
    }

    .char-badges {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .char-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      border-radius: 10px;
      padding: 8px 20px;
      font-size: 1.8rem;
      font-weight: bold;
      min-width: 70px;
      position: relative;
    }

    .char-badge .digit {
      font-size: 0.65rem;
      font-weight: normal;
      position: absolute;
      top: 5px;
      left: 8px;
      opacity: 0.9;
    }

    .badge-0 { background: #e53935; }
    .badge-1 { background: #fb8c00; }
    .badge-2 { background: #43a047; }
    .badge-3 { background: #039be5; }
    .badge-4 { background: #8e24aa; }

    .panel {
      max-width: 700px;
      margin: 0 auto 20px;
      background: #162040;
      border-radius: 12px;
      border: 1px solid #2a3f70;
      overflow: hidden;
    }

    .panel-header {
      background: #1a6fbf;
      padding: 10px 18px;
      font-size: 0.85rem;
      color: #cde;

    }

    .panel-header.decode { background: #1a6fbf; }

    .panel-body { padding: 18px; }

    textarea {
      width: 100%;
      border: 1.5px solid #3a5a90;
      background: #162645;
      color: #fff;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;

    textarea:focus {

    textarea::placeholder { color: #4a6080; }

    button {

    button:active { transform: scale(0.97); }

    .btn-encode { background: #43a047; color: #fff; }
    .btn-decode { background: #039be5; color: #fff; }
    .btn-copy   { background: #374a70; color: #cde; font-size: 0.85rem; padding: 10px 16px; }
    .btn-clear  { background: #2a3f70; color: #aab; font-size: 0.85rem; padding: 10px 16px; }

    button:hover { opacity: 0.85; }

    .output-box {
      background: #0f1d3a;
      border: 1.5px solid #3a5a90;

      word-break: break-all;

      font-size: 1.05rem;

    .output-box.decode-out { color: #7ed4f0; }
    .output-box.empty { color: #4a6080; font-style: italic; }

      background: #2a3f70; color: #aab;
      border: 1px solid #3a5a90; border-radius: 6px;

    .btn-mode.active { background: #1a6fbf; color: #fff; border-color: #3a8fd0; font-weight: bold; }
    .stats-bar { font-size: 0.8rem; color: #a0b4d6; margin-top: 8px; min-height: 18px; }

    @media (max-width: 500px) {

<body>

<h1>🦍 ゴリリンガル</h1>
<p class="subtitle">日本語テキストをウホッ！？の5文字だけで伝達する</p>

<!-- 文字マップ -->
<div class="char-map">
  <h2>文字マッピング（5進数の各桁）</h2>
  <div class="char-badges">
    <div class="char-badge badge-0"><span class="digit">0</span>ウ</div>
    <div class="char-badge badge-1"><span class="digit">1</span>ホ</div>
    <div class="char-badge badge-2"><span class="digit">2</span>ッ</div>
    <div class="char-badge badge-3"><span class="digit">3</span>！</div>
    <div class="char-badge badge-4"><span class="digit">4</span>？</div>
  </div>
</div>

<!-- エンコード -->
<div class="panel">
  <div class="panel-header">📝 エンコード：日本語 → ウホッ！？</div>
  <div class="panel-body">
    <div class="mode-row">
      <span class="mode-label">モード：</span>
      <button class="btn-mode active" id="mode-std"    onclick="setMode('std')">標準</button>
      <button class="btn-mode"        id="mode-static" onclick="setMode('static')">圧縮</button>
    </div>
    <textarea id="encode-input" placeholder="ここに日本語テキストを入力…" rows="3"></textarea>
    <div class="btn-row">
      <button class="btn-encode" onclick="doEncode()">エンコード</button>
      <button class="btn-copy"  onclick="copyResult('encode-output')">コピー</button>
      <button class="btn-clear" onclick="clearEncode()">クリア</button>
    </div>
    <div id="encode-stats" class="stats-bar"></div>
    <div id="encode-output" class="output-box empty"></div>
  </div>
</div>

<!-- デコード -->
<div class="panel">
  <div class="panel-header decode">🔍 デコード：ウホッ！？ → 日本語</div>
  <div class="panel-body">
    <textarea id="decode-input" placeholder="ここにウホッ！？文字列を入力…" rows="3"></textarea>
    <div class="btn-row">
      <button class="btn-decode" onclick="doDecode()">デコード</button>
      <button class="btn-copy"  onclick="copyResult('decode-output')">コピー</button>
      <button class="btn-clear" onclick="clearDecode()">クリア</button>
    </div>
    <div id="decode-output" class="output-box decode-out empty"></div>
    <div id="decode-mode-label" class="decode-mode-label"></div>
  </div>
</div>

<!-- 情報 -->
<div class="toast" id="toast">コピーしました！</div>

<script>
  const CHARS = ['ウ', 'ホ', 'ッ', '！', '？'];
  const CHAR_MAP = Object.fromEntries(CHARS.map((c, i) => [c, i]));

  // バイト → 5進数4桁 (リトルエンディアン)
  function byteTo5Base(byte) {
    const digits = [];
    let n = byte;
    for (let i = 0; i < 4; i++) {
      digits.push(n % 5);
      n = Math.floor(n / 5);
    }
    return digits; // 最下位桁が先
  }

  // 5進数4桁 (リトルエンディアン) → バイト
  function fiveBaseToBytes(digits) {
    let val = 0;
    for (let i = 3; i >= 0; i--) {
      val = val * 5 + digits[i];
    }
    return val;
  }

  function encode(text) {
    const utf8 = new TextEncoder().encode(text);
    const chars = [];
    for (const byte of utf8) {
      const digits = byteTo5Base(byte);
      for (const d of digits) chars.push(CHARS[d]);
    }
    return { encoded: chars.join(''), bytes: utf8, digits: [] };
  }

  function decode(gorilingual) {
    // ウホッ！？ 以外の文字はスキップ
    const filtered = [...gorilingual].filter(c => c in CHAR_MAP);
    // マジックバイト判定（先頭8文字 = 標準base-5で2バイト分）
    if (filtered.length >= 8) {
      const b0 = fiveBaseToBytes(filtered.slice(0, 4).map(c => CHAR_MAP[c]));
      const b1 = fiveBaseToBytes(filtered.slice(4, 8).map(c => CHAR_MAP[c]));
      if (b0 === 0xFF && b1 === 0xFD) return staticQHuffDecode(filtered.slice(8));
    }
    // 標準デコード（4の倍数チェック）
    if (filtered.length % 4 !== 0) {
      return { error: `文字数が4の倍数ではありません（${filtered.length}文字）。エンコードされたテキストを確認してください。` };
    }
    // 標準デコード
    const bytes = [];
    for (let i = 0; i < filtered.length; i += 4) {
      bytes.push(fiveBaseToBytes(filtered.slice(i, i + 4).map(c => CHAR_MAP[c])));
    }
    try {
      const text = new TextDecoder('utf-8', { fatal: true }).decode(new Uint8Array(bytes));
      return { text, mode: '標準' };
    } catch (e) {
      return { error: 'UTF-8デコードに失敗しました。入力を確認してください。' };
    }
  }

  let encodeMode = 'std';

  function setMode(mode) {
    encodeMode = mode;
    document.getElementById('mode-std').classList.toggle('active',    mode === 'std');
    document.getElementById('mode-static').classList.toggle('active', mode === 'static');
    const input = document.getElementById('encode-input').value;
    if (input.trim()) doEncode();
  }

  function doEncode() {
    const input = document.getElementById('encode-input').value;
    if (!input.trim()) return;

    const utf8 = new TextEncoder().encode(input);
    const stdEncoded = [...utf8].map(b => byteTo5Base(b).map(d => CHARS[d]).join('')).join('');
    const statsEl = document.getElementById('encode-stats');
    let encoded;

    if (encodeMode === 'static') {
      encoded = staticQHuffEncode(input);
      const diff = encoded.length - stdEncoded.length;
      const pct  = Math.abs((diff / stdEncoded.length) * 100).toFixed(1);
      statsEl.textContent = diff < 0
        ? `標準: ${stdEncoded.length}文字 → 圧縮: ${encoded.length}文字（${pct}% 削減 ✓）`
        : `標準: ${stdEncoded.length}文字 → 圧縮: ${encoded.length}文字（${pct}% 増加）`;
    } else {
      encoded = stdEncoded;
      statsEl.textContent = `${encoded.length}文字`;
    }

    const outEl = document.getElementById('encode-output');
    outEl.textContent = encoded;
    outEl.classList.remove('empty');
  }

  function doDecode() {
    const input = document.getElementById('decode-input').value;
    if (!input.trim()) return;

    const result = decode(input);
    const outEl   = document.getElementById('decode-output');
    const modeEl  = document.getElementById('decode-mode-label');
    if (result.error) {
      outEl.textContent  = '⚠ ' + result.error;
      outEl.style.color  = '#f07e7e';
      modeEl.textContent = '';
    } else {
      outEl.textContent  = result.text;
      outEl.style.color  = '';
      modeEl.textContent = `（${result.mode || '標準'}モードで復元）`;
    }
    outEl.classList.remove('empty');
  }

  function clearEncode() {
    document.getElementById('encode-input').value = '';
    const out = document.getElementById('encode-output');
    out.textContent = '';
    out.classList.add('empty');
    document.getElementById('encode-stats').textContent = '';
  }

  function clearDecode() {
    document.getElementById('decode-input').value = '';
    const out = document.getElementById('decode-output');
    out.textContent = '';
    out.classList.add('empty');
    out.style.color = '';
    document.getElementById('decode-mode-label').textContent = '';
  }

  function copyResult(id) {
    const text = document.getElementById(id).textContent;
    if (!text || document.getElementById(id).classList.contains('empty')) return;
    navigator.clipboard.writeText(text).then(() => showToast());
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  // Enter キーでエンコード（Shift+Enter で改行）
  document.getElementById('encode-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doEncode(); }
  });
  document.getElementById('decode-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doDecode(); }
  });

  // ── 静的5進ハフマン (サンプル20文から事前構築、全256バイト対応) ──
  // 0xFF=ウホウッ, 0xFD=！ウウッ をマジックプレフィックスとして使用
  const STATIC_ENC=["？？ウホッ","？！ッ！？","？？ウホホ","？？！ウッ","？！ッ！！","？？？ッ？","？？ウホウ","？！？ホ！","？？！ウホ","？？ッッ？","？！ッ！ッ","？？！？！","？！？？？","？？ウ！！","？ッウホ？","？？ッ？ッ","？！？ホッ","？！ホ！ウ","？？！ウウ","？！ッッッ","？？ッッ！","？？ホウ？","？！ッ！ホ","？！ホホ？","？？ホ？ホ","？！ホッ？","？！？？！","？！ホホッ","？？！ッ！","？？ウッ！","？ッウホ！","？？ホホ！","？？ホホウ","？！ホ？ホ","？！？ホホ","？！ホ！！","？？？ウ？","？？？ウウ","？？ッ？？","？！ッホ！","？！ッッホ","？？ッ！！","？？ッッッ","？？ッホ？","？？ッホホ","？？ッウッ","？！ッ！ウ","？？！！？","？！ッウ！","？？？？ッ","？？ホ？ウ","？！ホウ？","？？ホッ！","？？？！！","？！？？ッ","？？！ッ？","？！ホホホ","？？ウ？ッ","？？！ッッ","？？！ホ？","？？？ホウ","？？ウウ？","？ッウホッ","？？ウウウ","？？ホホ？","？？ホホホ","？！ホ？？","？！ホ？ッ","？！ホ？ウ","？！？ホ？","？！ホ？！","？？ッ！ホ","？！ホ！ッ","？！ホ！ホ","？？？ウ！","？？？ウホ","？？！ウ？","？？！ウ！","？！？ホウ","？？ッ？ホ","？？ッ？ウ","？！ッッ！","？！ッッウ","？？ッ！？","？？ッ！ッ","？？ッ！ウ","？？ッッホ","？？ッッウ","？？ッホ！","？？ッホッ","？？ッホウ","？？ッウ！","？？ッウホ","？？ッウウ","？？ッ？！","？！？ッホ","？！ッホホ","？？！！ホ","？！ッウッ","？？？？？","？？ホ？？","？？？？ウ","？？ホ！？","？？！？ホ","？？ホ！ホ","？！ホウホ","？？ホッッ","？！ホッウ","？？ホウッ","？？？！ホ","？！？？ホ","？？？ッホ","？！？ッ！","？？！！ッ","？！ホホウ","？！ホウッ","？！ホッッ","？？ウ？ウ","？？！ッホ","？？ウ！ホ","？？？ホ！","？？！ホウ","？？ウ？？","？？ウッホ","？？！ホッ","？？ウウホ","？ッウホホ","？？ウホ！","ウ！","ホ","？ウ","ウ？","？ホ？","？？ホホッ","ッ！ウ","ウウッ","ッウホ","ウウホ","ッホ！","？ホウ","ッ？ッ","ッウ？","？ッ！？","ウウウ","？！ホ！？","？ッ！！","ッ！！","？！ッ？","ウホウ","ッホッ","ウホ？","？ッ？","？ッウウ","？！ウ","？ッ！ッ","ッ？ホッ","？ッ！ホ","？ッ！ウ","ッ？ホ？","？ホ！","？ッウ？","？ッウ！","？！ッッ？","ウホホ","ッウッ","？ホホ","ッ？ウ","？ッホ","ッッウ","ッウ！","ッッ？","ッホ？","？！？！","ウウ！","ッッ！","ッ？？","ウホッ","ウホ！","ッ？ホホ","ッッッ","ッ？ホウ","？？ホッウ","？？ッウ？","ウウ？","ッホホ","ッウウ","ッッホ","？ッウッ","ッ！ッ","ッホウ","？ホッ","？！？ウ","？！ッホッ","？！？ッウ","？！ッホウ","？？！！！","？！ッウ？","？？！！ウ","？！ッウホ","？！ホホ！","？！ッウウ","？？？？！","？？ホ？！","？？？？ホ","？？ホ？ッ","？？！？？","？？ホ！！","？？！？ッ","？？ホ！ッ","？？！？ウ","？？ホ！ウ","？！ホウ！","？？ホッ？","？！ホウウ","？？ホッホ","？！ホッ！","？？ホウ！","？？？！？","？？ホウホ","？？？！ッ","？？ホウウ","？？？！ウ","？！？？ウ","？？？ッ！","？！？ッ？","？？？ッウ","？！？ッッ","！","ッ？！","ウッ","？！！","？ッッ","ッ！？","ッ！ホ","？！ホッホ","？？ウ？ホ","？？？ッッ","？？ウ！？","？？！ッウ","ッ？ホ！","？？？ホ？","？？ウ！ウ","？？？ホッ","？？！ホ！","？？？ホホ","？？ウッ？","？？ウ？！","？？ウッッ","？？ウ！ッ","？？ウッウ","？？！ホホ","？？ウウ！","？？ウウッ","？？ウホ？","？！ッホ？","？？？ウッ"];
  const STATIC_DEC = Object.fromEntries(STATIC_ENC.map((code, b) => [code, b]));

  // マジック2バイト (base-5) をプレフィックスとして付加
  const STATIC_MAGIC = CHARS[0xFF % 5] + CHARS[Math.floor(0xFF/5) % 5] + CHARS[Math.floor(0xFF/25) % 5] + CHARS[Math.floor(0xFF/125) % 5]
                     + CHARS[0xFD % 5] + CHARS[Math.floor(0xFD/5) % 5] + CHARS[Math.floor(0xFD/25) % 5] + CHARS[Math.floor(0xFD/125) % 5];

  function staticQHuffEncode(text) {
    const utf8 = new TextEncoder().encode(text);
    return STATIC_MAGIC + [...utf8].map(b => STATIC_ENC[b]).join('');
  }

  function staticQHuffDecode(dataChars) {
    const result = [];
    let buf = '';
    for (const c of dataChars) {
      buf += c;
      if (buf in STATIC_DEC) { result.push(STATIC_DEC[buf]); buf = ''; }
      else if (buf.length > 5) return { error: 'デコードエラー：静的テーブルに一致するコードが見つかりません。' };
    }
    if (buf.length > 0) return { error: 'デコードエラー：末尾に未対応のコードがあります。' };
    try {
      return { text: new TextDecoder('utf-8', { fatal: true }).decode(new Uint8Array(result)), mode: '静的5進HF' };
    } catch (e) {
      return { error: 'UTF-8デコードに失敗しました。' };
    }
  }

  function huffmanDecode(filtered) { return { error: 'バイナリハフマン形式はサポートされていません。' }; }
</script>
