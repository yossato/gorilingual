<svg width="820" height="420" xmlns="http://www.w3.org/2000/svg">
  <rect width="820" height="420" fill="#f8f9fa" rx="12" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Title -->
  <text x="410" y="28" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14" font-weight="bold" fill="#212529" text-anchor="middle">OGPメタタグとカード表示の対応</text>

  <!-- Left: HTML code block -->
  <rect x="20" y="50" width="400" height="310" rx="8" fill="#1e1e2e" stroke="#444"/>
  <text x="36" y="72" font-family="monospace" font-size="11" fill="#88c0d0">&lt;head&gt;</text>

  <!-- og:title -->
  <rect x="30" y="80" width="380" height="22" rx="3" fill="#2d2d44"/>
  <text x="48" y="95" font-family="monospace" font-size="10" fill="#a3be8c">&lt;meta property="</text>
  <text x="183" y="95" font-family="monospace" font-size="10" fill="#ebcb8b">og:title</text>
  <text x="240" y="95" font-family="monospace" font-size="10" fill="#a3be8c">"</text>
  <text x="249" y="95" font-family="monospace" font-size="10" fill="#bf616a">content="ゴリリンガル"</text>
  <text x="382" y="95" font-family="monospace" font-size="10" fill="#a3be8c">/&gt;</text>

  <!-- og:description -->
  <rect x="30" y="108" width="380" height="22" rx="3" fill="#2d2d44"/>
  <text x="48" y="123" font-family="monospace" font-size="10" fill="#a3be8c">&lt;meta property="</text>
  <text x="183" y="123" font-family="monospace" font-size="10" fill="#ebcb8b">og:description</text>
  <text x="284" y="123" font-family="monospace" font-size="10" fill="#a3be8c">"</text>
  <text x="293" y="123" font-family="monospace" font-size="10" fill="#bf616a">content="..."</text>
  <text x="382" y="123" font-family="monospace" font-size="10" fill="#a3be8c">/&gt;</text>

  <!-- og:image -->
  <rect x="30" y="136" width="380" height="22" rx="3" fill="#2d2d44"/>
  <text x="48" y="151" font-family="monospace" font-size="10" fill="#a3be8c">&lt;meta property="</text>
  <text x="183" y="151" font-family="monospace" font-size="10" fill="#ebcb8b">og:image</text>
  <text x="240" y="151" font-family="monospace" font-size="10" fill="#a3be8c">"</text>
  <text x="249" y="151" font-family="monospace" font-size="10" fill="#bf616a">content="...ogp.png"</text>
  <text x="382" y="151" font-family="monospace" font-size="10" fill="#a3be8c">/&gt;</text>

  <!-- og:url -->
  <rect x="30" y="164" width="380" height="22" rx="3" fill="#2d2d44"/>
  <text x="48" y="179" font-family="monospace" font-size="10" fill="#a3be8c">&lt;meta property="</text>
  <text x="183" y="179" font-family="monospace" font-size="10" fill="#ebcb8b">og:url</text>
  <text x="225" y="179" font-family="monospace" font-size="10" fill="#a3be8c">"</text>
  <text x="234" y="179" font-family="monospace" font-size="10" fill="#bf616a">content="https://..."</text>
  <text x="382" y="179" font-family="monospace" font-size="10" fill="#a3be8c">/&gt;</text>

  <!-- og:type -->
  <rect x="30" y="192" width="380" height="22" rx="3" fill="#2d2d44"/>
  <text x="48" y="207" font-family="monospace" font-size="10" fill="#a3be8c">&lt;meta property="</text>
  <text x="183" y="207" font-family="monospace" font-size="10" fill="#ebcb8b">og:type</text>
  <text x="232" y="207" font-family="monospace" font-size="10" fill="#a3be8c">"</text>
  <text x="241" y="207" font-family="monospace" font-size="10" fill="#bf616a">content="website"</text>
  <text x="382" y="207" font-family="monospace" font-size="10" fill="#a3be8c">/&gt;</text>

  <!-- twitter:card -->
  <rect x="30" y="226" width="380" height="22" rx="3" fill="#162032"/>
  <text x="48" y="241" font-family="monospace" font-size="10" fill="#88c0d0">&lt;meta name="</text>
  <text x="148" y="241" font-family="monospace" font-size="10" fill="#4cc9f0">twitter:card</text>
  <text x="224" y="241" font-family="monospace" font-size="10" fill="#88c0d0">"</text>
  <text x="233" y="241" font-family="monospace" font-size="10" fill="#f4a261">content="summary_large_image"</text>
  <text x="382" y="241" font-family="monospace" font-size="10" fill="#88c0d0">/&gt;</text>

  <!-- twitter:image -->
  <rect x="30" y="254" width="380" height="22" rx="3" fill="#162032"/>
  <text x="48" y="269" font-family="monospace" font-size="10" fill="#88c0d0">&lt;meta name="</text>
  <text x="148" y="269" font-family="monospace" font-size="10" fill="#4cc9f0">twitter:image</text>
  <text x="232" y="269" font-family="monospace" font-size="10" fill="#88c0d0">"</text>
  <text x="241" y="269" font-family="monospace" font-size="10" fill="#f4a261">content="...ogp.png"</text>
  <text x="382" y="269" font-family="monospace" font-size="10" fill="#88c0d0">/&gt;</text>

  <text x="36" y="308" font-family="monospace" font-size="11" fill="#88c0d0">&lt;/head&gt;</text>

  <!-- Legend -->
  <rect x="34" y="320" width="10" height="10" fill="#2d2d44"/>
  <text x="50" y="330" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#adb5bd">Open Graph (OGP)</text>
  <rect x="34" y="338" width="10" height="10" fill="#162032"/>
  <text x="50" y="348" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#adb5bd">Twitter Card (X独自)</text>

  <!-- Right: Card mockup -->
  <rect x="450" y="50" width="350" height="310" rx="8" fill="white" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="625" y="72" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Xのタイムライン上でのカード表示</text>

  <!-- Card preview area -->
  <rect x="470" y="82" width="310" height="200" rx="6" fill="#e9ecef" stroke="#adb5bd"/>
  <!-- OGP image area -->
  <rect x="470" y="82" width="310" height="130" rx="6" fill="#2c3e50"/>
  <text x="625" y="138" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="26" fill="#f0a500" text-anchor="middle">🦍 ゴリリンガル</text>
  <text x="625" y="160" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#ecf0f1" text-anchor="middle">日本語 → ウホッ！？</text>
  <!-- Image label -->
  <rect x="476" y="88" width="66" height="16" rx="3" fill="rgba(0,0,0,0.5)"/>
  <text x="509" y="100" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="white" text-anchor="middle">og:image</text>

  <!-- Card text area -->
  <rect x="470" y="212" width="310" height="70" rx="0" fill="white" stroke="#dee2e6"/>
  <!-- Title -->
  <text x="484" y="230" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" font-weight="bold" fill="#212529">ゴリリンガル</text>
  <rect x="530" y="218" width="55" height="14" rx="3" fill="#ebcb8b" opacity="0.4"/>
  <text x="558" y="229" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#996600" text-anchor="middle">og:title</text>
  <!-- Description -->
  <text x="484" y="246" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#666">日本語テキストをウホッ！？に変換</text>
  <rect x="484" y="252" width="72" height="14" rx="3" fill="#a3be8c" opacity="0.4"/>
  <text x="520" y="263" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#2d6a4f" text-anchor="middle">og:description</text>
  <!-- URL -->
  <text x="484" y="278" font-family="monospace" font-size="9" fill="#adb5bd">yossato.github.io</text>

  <!-- Connector lines -->
  <line x1="410" y1="91" x2="509" y2="100" stroke="#ebcb8b" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="410" y1="119" x2="520" y2="255" stroke="#a3be8c" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="410" y1="147" x2="509" y2="100" stroke="#a3be8c" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="410" y1="235" x2="558" y2="226" stroke="#ebcb8b" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- Card type label -->
  <rect x="470" y="290" width="310" height="44" rx="0" fill="#1da1f2" opacity="0.08"/>
  <text x="625" y="310" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#1da1f2" text-anchor="middle" font-weight="bold">twitter:card = summary_large_image</text>
  <text x="625" y="328" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#555" text-anchor="middle">大きな画像付きカード形式で表示</text>

  <!-- Note -->
  <text x="410" y="398" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#888" text-anchor="middle">og:title/description/image は Facebook や LINE などの他SNSでも共通して使われる</text>
</svg>
