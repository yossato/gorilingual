<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | 🦍 ゴリリンガル</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1b3e;
      color: #c8d8f0;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.8;
      padding: 0;
    }

    /* ナビゲーションバー */
    nav {
      background: #0a1530;
      border-bottom: 1px solid #2a3f70;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav a {
      color: #a0b4d6;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.15s;
    }

    nav a:hover { color: #fff; }

    nav .nav-home {
      color: #fff;
      font-weight: bold;
      font-size: 1rem;
    }

    nav .nav-sep { color: #2a3f70; }

    nav .nav-current { color: #7eb8f0; font-size: 0.9rem; }

    /* メインコンテンツ */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* 見出し */
    h1 {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      margin-bottom: 12px;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    h2 {
      font-size: 1.35rem;
      font-weight: bold;
      color: #7eb8f0;
      margin-top: 48px;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid #2a3f70;
    }

    h3 {
      font-size: 1.1rem;
      font-weight: bold;
      color: #a0c8f0;
      margin-top: 28px;
      margin-bottom: 10px;
    }

    h4 {
      font-size: 0.95rem;
      font-weight: bold;
      color: #a0b4d6;
      margin-top: 20px;
      margin-bottom: 8px;
    }

    /* 段落 */
    p {
      margin-bottom: 14px;
      color: #c8d8f0;
    }

    /* リンク */
    a { color: #5aabf0; text-decoration: none; }
    a:hover { text-decoration: underline; color: #7ec8ff; }

    /* 強調 */
    strong { color: #fff; font-weight: bold; }
    em { color: #d0e8ff; font-style: italic; }

    /* 水平線 */
    hr {
      border: none;
      border-top: 1px solid #2a3f70;
      margin: 32px 0;
    }

    /* インラインコード */
    code {
      background: #162040;
      color: #7ef07e;
      font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 0.88em;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #2a3f70;
    }

    /* コードブロック */
    pre {
      background: #0a1525;
      border: 1px solid #2a3f70;
      border-radius: 10px;
      padding: 20px 24px;
      overflow-x: auto;
      margin: 18px 0;
    }

    pre code {
      background: none;
      border: none;
      color: #c8f0a0;
      font-size: 0.9rem;
      padding: 0;
    }

    /* テーブル */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 0.92rem;
    }

    thead th {
      background: #1a2e5a;
      color: #a0c8f0;
      font-weight: bold;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 2px solid #2a3f70;
    }

    tbody tr { border-bottom: 1px solid #1e2e50; }
    tbody tr:nth-child(even) { background: #111e3a; }
    tbody tr:hover { background: #162040; }

    td {
      padding: 9px 14px;
      color: #c8d8f0;
      vertical-align: top;
    }

    td code { font-size: 0.85em; }

    /* 引用 */
    blockquote {
      border-left: 3px solid #1a6fbf;
      background: #111e3a;
      padding: 12px 18px;
      margin: 18px 0;
      border-radius: 0 8px 8px 0;
    }

    blockquote p {
      color: #a0b4d6;
      margin: 0;
    }

    /* リスト */
    ul, ol {
      padding-left: 24px;
      margin: 10px 0 14px;
    }

    li {
      margin-bottom: 6px;
      color: #c8d8f0;
    }

    li > ul, li > ol { margin-top: 4px; margin-bottom: 4px; }

    /* 画像・SVG */
    img, svg {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 22px auto;
      border-radius: 10px;
    }

    /* ページ先頭のリード文 (h1直後のp) */
    h1 + p {
      color: #a0b4d6;
      font-size: 1.05rem;
      margin-bottom: 28px;
    }

    /* フッター */
    footer {
      border-top: 1px solid #2a3f70;
      margin-top: 60px;
      padding: 24px;
      text-align: center;
    }

    footer a {
      color: #5aabf0;
      font-size: 0.9rem;
    }

    /* レスポンシブ */
    @media (max-width: 600px) {
      main { padding: 24px 16px 60px; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.15rem; }
      pre { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="{{ site.baseurl }}/" class="nav-home">🦍 ゴリリンガル</a>
  <span class="nav-sep">›</span>
  <span class="nav-current">{{ page.title }}</span>
</nav>

<main>
  {{ content }}
</main>

<footer>
  <a href="{{ site.baseurl }}/">← ゴリリンガル トップへ戻る</a>
</footer>

</body>
</html>
