<svg width="780" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="780" height="300" fill="#f8f9fa" rx="12" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Title -->
  <text x="390" y="26" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14" font-weight="bold" fill="#212529" text-anchor="middle">OGPの仕組み：URLをSNSに共有したとき何が起きるか</text>

  <!-- Box: User -->
  <rect x="20" y="60" width="110" height="54" rx="8" fill="#4361ee" stroke="#3a0ca3" stroke-width="1.5"/>
  <text x="75" y="83" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">ユーザー</text>
  <text x="75" y="101" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#c8d0ff" text-anchor="middle">URLをXに投稿</text>

  <!-- Arrow 1 -->
  <line x1="130" y1="87" x2="168" y2="87" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="149" y="80" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#888" text-anchor="middle">投稿</text>

  <!-- Box: X server -->
  <rect x="168" y="60" width="120" height="54" rx="8" fill="#212529" stroke="#495057" stroke-width="1.5"/>
  <text x="228" y="83" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Xサーバー</text>
  <text x="228" y="101" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#adb5bd" text-anchor="middle">Twitterbot/2.0</text>

  <!-- Arrow 2: down to crawler -->
  <line x1="228" y1="114" x2="228" y2="148" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="242" y="136" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#888">クロール</text>

  <!-- Box: crawler -->
  <rect x="168" y="148" width="120" height="54" rx="8" fill="#e9ecef" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="228" y="169" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#212529" text-anchor="middle" font-weight="bold">Twitterbotクローラー</text>
  <text x="228" y="186" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#555" text-anchor="middle">GETリクエスト送信</text>

  <!-- Arrow 3: to Web server -->
  <line x1="288" y1="175" x2="356" y2="175" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="322" y="168" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#888" text-anchor="middle">HTTP GET</text>

  <!-- Box: Web server -->
  <rect x="356" y="148" width="160" height="54" rx="8" fill="#2d6a4f" stroke="#1b4332" stroke-width="1.5"/>
  <text x="436" y="169" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">GitHub Pages</text>
  <text x="436" y="185" font-family="monospace" font-size="9" fill="#95d5b2" text-anchor="middle">yossato.github.io/gorilingual</text>

  <!-- Arrow 4: return HTML -->
  <path d="M436 148 L436 87 L302 87" stroke="#2d6a4f" stroke-width="1.5" fill="none" marker-end="url(#arrgr)" stroke-dasharray="5,3"/>
  <text x="400" y="78" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#2d6a4f" text-anchor="middle">HTMLレスポンス（ogタグ含む）</text>

  <!-- Box: Cache -->
  <rect x="546" y="148" width="115" height="54" rx="8" fill="#f8961e" stroke="#f3722c" stroke-width="1.5"/>
  <text x="603" y="169" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">OGPキャッシュ</text>
  <text x="603" y="186" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#fff3" text-anchor="middle">Twitter側に保存</text>

  <!-- Arrow 5: cache -->
  <line x1="516" y1="175" x2="546" y2="175" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow 6: down to card display -->
  <line x1="603" y1="202" x2="603" y2="230" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box: Card display -->
  <rect x="546" y="230" width="115" height="44" rx="8" fill="#4cc9f0" stroke="#4361ee" stroke-width="1.5"/>
  <text x="603" y="249" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#212529" text-anchor="middle" font-weight="bold">カード表示</text>
  <text x="603" y="265" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#333" text-anchor="middle">タイムラインに表示</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c757d"/>
    </marker>
    <marker id="arrgr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2d6a4f"/>
    </marker>
  </defs>

  <!-- Note at bottom -->
  <text x="390" y="285" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#888" text-anchor="middle">※ クロールは初回シェア時または手動更新時に実行。結果はXサーバーにキャッシュされる。</text>
</svg>
