<svg width="720" height="340" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="340" fill="#f8f9fa" rx="12" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Title -->
  <text x="360" y="28" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14" font-weight="bold" fill="#212529" text-anchor="middle">Twitter Card のタイプ比較</text>

  <!-- summary card (left) -->
  <rect x="30" y="48" width="290" height="220" rx="10" fill="white" stroke="#dee2e6" stroke-width="2"/>
  <text x="175" y="70" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" font-weight="bold" fill="#1da1f2" text-anchor="middle">summary</text>
  <text x="175" y="86" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">twitter:card = "summary"</text>

  <!-- summary: small image left + text right -->
  <rect x="46" y="100" width="76" height="76" rx="6" fill="#4361ee"/>
  <text x="84" y="138" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle">🦍</text>
  <!-- small image label -->
  <text x="84" y="190" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#888" text-anchor="middle">画像 144×144</text>

  <text x="138" y="115" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" font-weight="bold" fill="#212529">ゴリリンガル</text>
  <text x="138" y="132" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#666">日本語→ウホッ変換…</text>
  <text x="138" y="147" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#adb5bd">yossato.github.io</text>

  <!-- summary pros/cons -->
  <line x1="46" y1="206" x2="304" y2="206" stroke="#f0f0f0" stroke-width="1"/>
  <text x="175" y="222" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#555" text-anchor="middle">画像は小さく表示。コンパクトな表示向き。</text>
  <text x="175" y="238" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#888" text-anchor="middle">テキスト情報がメインのページに適する。</text>
  <text x="175" y="258" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#ccc" text-anchor="middle">推奨画像サイズ: 144×144 〜 1:1</text>

  <!-- summary_large_image card (right) -->
  <rect x="390" y="48" width="300" height="260" rx="10" fill="white" stroke="#1da1f2" stroke-width="2"/>
  <text x="540" y="70" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" font-weight="bold" fill="#1da1f2" text-anchor="middle">summary_large_image</text>
  <text x="540" y="86" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">twitter:card = "summary_large_image"</text>

  <!-- large image top -->
  <rect x="406" y="96" width="268" height="120" rx="6" fill="#2c3e50"/>
  <text x="540" y="148" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" fill="#f0a500" text-anchor="middle">🦍 ゴリリンガル</text>
  <text x="540" y="168" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#ecf0f1" text-anchor="middle">日本語 → ウホッ！？</text>

  <!-- large image label -->
  <text x="540" y="228" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#888" text-anchor="middle">画像 1200×630（横長）</text>

  <text x="418" y="244" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" font-weight="bold" fill="#212529">ゴリリンガル</text>
  <text x="418" y="260" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#666">日本語テキストをウホッ！？に変換する…</text>
  <text x="418" y="275" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#adb5bd">yossato.github.io</text>

  <!-- Recommended badge -->
  <rect x="580" y="54" width="72" height="20" rx="10" fill="#1da1f2"/>
  <text x="616" y="67" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">推奨</text>

  <!-- Bottom note -->
  <text x="360" y="318" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#888" text-anchor="middle">他に player（動画）・app（アプリ）タイプもあるが、一般のWebページには summary_large_image が最適</text>
</svg>
