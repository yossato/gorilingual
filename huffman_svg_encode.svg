<svg width="780" height="420" xmlns="http://www.w3.org/2000/svg">
  <rect width="780" height="420" fill="#fafbfc" rx="12" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Title -->
  <text x="390" y="28" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" font-weight="bold" fill="#333" text-anchor="middle">エンコード例：「こ」(U+3053)</text>
  <text x="390" y="46" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#888" text-anchor="middle">UTF-8バイト列 → 各バイトをハフマン木で引く → 連結</text>

  <!-- ===== Step 1: UTF-8 decomposition ===== -->
  <rect x="20" y="62" width="740" height="52" rx="8" fill="#eef4fb" stroke="#b8d0ec" stroke-width="1"/>
  <text x="36" y="80" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#666">① UTF-8バイト分解</text>
  <!-- Char box -->
  <rect x="36"  y="88" width="44" height="18" rx="4" fill="#4a90d9"/>
  <text x="58"  y="101" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="13" fill="white" text-anchor="middle">こ</text>
  <text x="86"  y="101" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="13" fill="#888" text-anchor="middle">→</text>
  <!-- Byte boxes -->
  <rect x="104" y="88" width="54" height="18" rx="4" fill="#5c7fa8"/>
  <text x="131" y="101" font-family="monospace" font-size="12" fill="white" text-anchor="middle">E3</text>
  <rect x="166" y="88" width="54" height="18" rx="4" fill="#5c7fa8"/>
  <text x="193" y="101" font-family="monospace" font-size="12" fill="white" text-anchor="middle">81</text>
  <rect x="228" y="88" width="54" height="18" rx="4" fill="#5c7fa8"/>
  <text x="255" y="101" font-family="monospace" font-size="12" fill="white" text-anchor="middle">93</text>
  <text x="316" y="101" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#999">（3バイト）</text>

  <!-- ===== Step 2: Lookup per byte ===== -->
  <!-- Label -->
  <text x="36" y="135" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#666">② 各バイトをハフマン木で検索</text>

  <!-- Byte E3 -->
  <rect x="20"  y="148" width="230" height="76" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <!-- byte badge -->
  <rect x="30"  y="156" width="46" height="22" rx="4" fill="#5c7fa8"/>
  <text x="53"  y="171" font-family="monospace" font-size="13" fill="white" text-anchor="middle">0xE3</text>
  <!-- tree path description -->
  <text x="82"  y="164" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#888">根 →【！】→ 葉</text>
  <text x="82"  y="177" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#bbb">（深さ1、最頻出）</text>
  <!-- Result code -->
  <text x="124" y="205" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="26" fill="#27ae60" text-anchor="middle" font-weight="bold">！</text>
  <text x="178" y="205" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#27ae60">1文字</text>

  <!-- Byte 81 -->
  <rect x="270" y="148" width="230" height="76" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <rect x="280" y="156" width="46" height="22" rx="4" fill="#5c7fa8"/>
  <text x="303" y="171" font-family="monospace" font-size="13" fill="white" text-anchor="middle">0x81</text>
  <text x="332" y="164" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#888">根 →【ホ】→ 葉</text>
  <text x="332" y="177" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#bbb">（深さ1、2番目に頻出）</text>
  <text x="374" y="205" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="26" fill="#27ae60" text-anchor="middle" font-weight="bold">ホ</text>
  <text x="428" y="205" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#27ae60">1文字</text>

  <!-- Byte 93 -->
  <rect x="520" y="148" width="240" height="76" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <rect x="530" y="156" width="46" height="22" rx="4" fill="#5c7fa8"/>
  <text x="553" y="171" font-family="monospace" font-size="13" fill="white" text-anchor="middle">0x93</text>
  <text x="582" y="164" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#888">根→？→！→ッ→？→葉</text>
  <text x="582" y="177" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#bbb">（深さ4）</text>
  <text x="634" y="205" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="20" fill="#e67e22" text-anchor="middle" font-weight="bold">？！ッ？</text>
  <text x="706" y="205" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#e67e22">4文字</text>

  <!-- ===== Step 3: Concatenate ===== -->
  <rect x="20" y="244" width="740" height="60" rx="8" fill="#fef9e7" stroke="#f0c040" stroke-width="1.5"/>
  <text x="36"  y="262" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#7a5c00">③ 連結</text>
  <text x="36"  y="288" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="26" fill="#27ae60" font-weight="bold">！</text>
  <text x="60"  y="288" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="24" fill="#888">＋</text>
  <text x="84"  y="288" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="26" fill="#27ae60" font-weight="bold">ホ</text>
  <text x="108" y="288" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="24" fill="#888">＋</text>
  <text x="132" y="288" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="26" fill="#e67e22" font-weight="bold">？！ッ？</text>
  <text x="248" y="288" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="24" fill="#888">＝</text>
  <rect x="274" y="266" width="200" height="32" rx="6" fill="#333"/>
  <text x="374" y="288" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">！ホ？！ッ？</text>
  <text x="490" y="288" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14" fill="#555">← 6文字</text>

  <!-- ===== Comparison ===== -->
  <rect x="20" y="322" width="740" height="78" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="36"  y="340" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#666">④ 標準エンコードとの比較（「こ」= 3バイト）</text>

  <!-- Standard bar -->
  <text x="36"  y="362" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#555">標準：</text>
  <rect x="90"  y="350" width="360" height="20" rx="4" fill="#e74c3c"/>
  <text x="458" y="364" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">12文字</text>
  <text x="560" y="364" font-family="monospace" font-size="10" fill="#bbb">！ッウ？ホ！ッ？ッッ！？</text>

  <!-- HF bar -->
  <text x="36"  y="387" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#555">ＨＦ：</text>
  <rect x="90"  y="375" width="180" height="20" rx="4" fill="#27ae60"/>
  <text x="278" y="389" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#27ae60" font-weight="bold">6文字</text>

  <!-- Reduction label -->
  <rect x="466" y="355" width="120" height="36" rx="6" fill="#27ae60"/>
  <text x="526" y="369" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">▼ 50% 削減</text>
  <text x="526" y="384" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#d4ffec" text-anchor="middle">12文字 → 6文字</text>
</svg>
