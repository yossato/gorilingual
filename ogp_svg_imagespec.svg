<svg width="680" height="380" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="380" fill="#f8f9fa" rx="12" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Title -->
  <text x="340" y="28" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14" font-weight="bold" fill="#212529" text-anchor="middle">OGP画像の推奨仕様</text>

  <!-- Main image rectangle 1200x630 (scaled: 600x315) -->
  <rect x="40" y="50" width="600" height="228" rx="8" fill="#2c3e50" stroke="#4361ee" stroke-width="2.5"/>
  <text x="340" y="150" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" fill="#f0a500" text-anchor="middle">🦍 ゴリリンガル</text>
  <text x="340" y="178" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="13" fill="#ecf0f1" text-anchor="middle">日本語 → ウホッ！？ への変換ツール</text>
  <text x="340" y="200" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle">yossato.github.io/gorilingual</text>

  <!-- Width label (top) -->
  <line x1="40" y1="44" x2="640" y2="44" stroke="#4361ee" stroke-width="1.5" marker-start="url(#tick)" marker-end="url(#tick)"/>
  <text x="340" y="41" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" font-weight="bold" fill="#4361ee" text-anchor="middle">1200 px</text>

  <!-- Height label (right) -->
  <line x1="648" y1="50" x2="648" y2="278" stroke="#e63946" stroke-width="1.5" marker-start="url(#tickr)" marker-end="url(#tickr)"/>
  <text x="665" y="170" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="12" font-weight="bold" fill="#e63946" text-anchor="middle" transform="rotate(90, 665, 170)">630 px</text>

  <!-- Aspect ratio label -->
  <rect x="270" y="226" width="140" height="26" rx="13" fill="#4361ee"/>
  <text x="340" y="243" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">アスペクト比 1.91 : 1</text>

  <!-- Minimum size indicator (inner rect) -->
  <rect x="40" y="50" width="300" height="114" rx="4" fill="none" stroke="#f4a261" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="46" y="56" width="80" height="18" rx="9" fill="#f4a261"/>
  <text x="86" y="68" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">最小サイズ</text>
  <text x="190" y="110" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" fill="#f4a261" text-anchor="middle">600 × 315 px</text>
  <text x="190" y="126" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="9" fill="#f4a261" opacity="0.8" text-anchor="middle">（Twitterの最小推奨）</text>

  <!-- Specs list -->
  <rect x="40" y="295" width="600" height="72" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="60" y="316" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="11" font-weight="bold" fill="#212529">仕様まとめ</text>
  <text x="60" y="334" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#555">推奨サイズ: 1200×630 px　　最小サイズ: 600×315 px　　アスペクト比: 1.91:1</text>
  <text x="60" y="352" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="10" fill="#555">ファイル形式: PNG / JPEG（推奨 PNG）　　ファイルサイズ: 5 MB 以下（Twitter）</text>

  <!-- Markers -->
  <defs>
    <marker id="tick" markerWidth="4" markerHeight="8" refX="2" refY="4" orient="auto">
      <line x1="2" y1="0" x2="2" y2="8" stroke="#4361ee" stroke-width="1.5"/>
    </marker>
    <marker id="tickr" markerWidth="4" markerHeight="8" refX="2" refY="4" orient="auto">
      <line x1="2" y1="0" x2="2" y2="8" stroke="#e63946" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
